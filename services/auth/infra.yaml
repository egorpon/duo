services:
  auth-postgres:
    image: "postgres:16-alpine"
    container_name: "auth-postgres"
    env_file:
      - .env
    ports:
      - "25432:5432"
    volumes:
      - auth-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  auth-postgres:
    name: duo-auth-postgres
