name: checks-frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  checks-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ui

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10  

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm  
          cache-dependency-path: sevices/ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
