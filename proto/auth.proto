syntax = "proto3";

package auth.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service UserService {
  rpc CreateUser (CreateUserRequest) returns (AuthResponse);
  rpc LoginUser (LoginUserRequest) returns (AuthResponse);
  rpc UpdateUserEmail (UpdateUserEmailRequest) returns (User);
  rpc UpdateUserPassword (UpdateUserPasswordRequest) returns (AuthResponse);

  rpc GetCurrentUser (google.protobuf.Empty) returns (User);
  rpc GetUserById (GetUserByIdRequest) returns (User);
}

message User {
  int32 id = 1;
  string email = 2;
  google.protobuf.Timestamp created_at = 100;
  google.protobuf.Timestamp updated_at = 101;
  google.protobuf.Timestamp password_updated_at = 102;
}

message UpdateUserEmailRequest {
  string new_email = 1;
}

message UpdateUserPasswordRequest {
  string new_password = 1;
}

message CreateUserRequest {
  string email = 1;
  string password = 2;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  reserved 2;
  string access_token = 1;
  // string refresh_token = 2;
  google.protobuf.Timestamp expires_at = 10;
  google.protobuf.Timestamp issued_at = 11;
}

message GetUserByIdRequest {
  int32 id = 1;
}
